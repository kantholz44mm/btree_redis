services:
  redis:
    image: "redis:latest"
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
  insight:
    image: "redis/redisinsight:latest"
    ports:
      - '5540:5540'
    volumes:
      - insight-data:/data
    environment:
      - RI_REDIS_HOST1=host.docker.internal
      - RI_REDIS_ALIAS1=Redis
      - RI_REDIS_HOST2=host.docker.internal
      - RI_REDIS_PORT2=3000
      - RI_REDIS_ALIAS2=B-Tree Redis
volumes:
  redis-data:
    driver: local
  insight-data:
    driver: local